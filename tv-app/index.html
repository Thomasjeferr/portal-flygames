<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Fly Games - TV</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Tela de autorização (QR + código) -->
    <section id="screen-auth" class="screen active">
      <div class="auth-container">
        <h1 class="auth-title">Assistir na TV</h1>
        <p class="auth-subtitle">Escaneie o QR code com seu celular (navegador ou app Fly Games) para autorizar.</p>
        <div class="auth-qr-wrap">
          <img id="qr-image" src="" alt="QR Code" width="320" height="320" />
        </div>
        <p class="auth-code-label">Ou digite o código em flygames.app/tv</p>
        <p id="auth-code" class="auth-code"></p>
        <p id="auth-expiry" class="auth-expiry"></p>
      </div>
    </section>

    <!-- Tela de catálogo -->
    <section id="screen-catalog" class="screen">
      <header class="catalog-header">
        <h1 class="catalog-title">Fly Games</h1>
      </header>
      <div id="catalog-grid" class="catalog-grid" role="list"></div>
      <p id="catalog-message" class="catalog-message"></p>
    </section>

    <!-- Tela de player -->
    <section id="screen-player" class="screen">
      <video id="video-player" class="video-player" controls playsinline></video>
      <button id="player-back" class="player-back" data-focusable>Voltar</button>
    </section>

    <!-- Sessão expirada -->
    <section id="screen-expired" class="screen">
      <div class="auth-container">
        <h1 class="auth-title">Sessão encerrada</h1>
        <p class="auth-subtitle">Escaneie o QR code novamente na TV para continuar assistindo.</p>
        <button id="btn-refresh-auth" class="btn-primary" data-focusable>Mostrar QR code</button>
      </div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8"></script>
  <script src="js/app.js"></script>
</body>
</html>
